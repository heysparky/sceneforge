<div class="sf-char-manager">
  <div class="sf-scene-folders">
    <div class="form-group stacked">
      <label>Source folder <span class="units">(template actors)</span></label>
      <select name="sourceFolder">
        <option value="">— none —</option>
        {{#each allFolders}}
        <option value="{{id}}" {{#if (eq id ../sourceFolder)}}selected{{/if}}>{{name}}</option>
        {{/each}}
      </select>
    </div>
    <div class="form-group stacked">
      <label>Destination folder <span class="units">(player copies)</span></label>
      <select name="destFolder">
        <option value="">— none —</option>
        {{#each allFolders}}
        <option value="{{id}}" {{#if (eq id ../destFolder)}}selected{{/if}}>{{name}}</option>
        {{/each}}
      </select>
    </div>
  </div>
  <div class="sf-char-list" id="sf-char-list">
    {{#each characters}}
    <div class="sf-char-row" data-actor-id="{{id}}">
      <div class="sf-char-row__move">
        <button type="button" class="sf-icon-btn" data-action="moveUp" title="Move up">↑</button>
        <button type="button" class="sf-icon-btn" data-action="moveDown" title="Move down">↓</button>
      </div>
      <img class="sf-char-row__img" src="{{img}}" alt="{{name}}">
      <span class="sf-char-row__name">{{name}}</span>
      <div class="sf-char-row__btns">
        <button type="button" class="sf-btn sf-btn--ghost sf-btn--sm" data-action="editDossier">Dossier</button>
        <button type="button" class="sf-icon-btn sf-icon-btn--remove" data-action="remove" title="Remove">✕</button>
      </div>
    </div>
    {{/each}}
    {{#unless characters.length}}
    <p class="sf-char-manager__empty">No characters yet.</p>
    {{/unless}}
  </div>
  <footer class="sf-char-manager__foot">
    <button type="button" class="sf-btn sf-btn--ghost" data-action="addMore">+ Add Characters</button>
    <span class="sf-char-manager__foot-right">
      <button type="button" class="sf-btn sf-btn--ghost" data-action="cancelManager">Cancel</button>
      <button type="button" class="sf-btn sf-btn--accent" data-action="saveManager">Save</button>
    </span>
  </footer>
</div>
