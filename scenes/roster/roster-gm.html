<div class="sf-gm-panel">

  <div class="sf-pool-list">
    {{#each actors}}
    <div class="sf-pool-row" draggable="true" data-actor-id="{{actor.id}}">
      <span class="sf-drag-handle" aria-hidden="true"><i class="fas fa-grip-vertical"></i></span>
      <img class="sf-actor-thumb" src="{{actor.img}}" alt="{{actor.name}}">
      <div class="sf-actor-info">
        <strong>{{actor.name}}</strong>
        <input type="text" placeholder="One-sentence description…"
               value="{{description}}" data-description-for="{{actor.id}}">
      </div>
      {{#unless claimed}}
      <button type="button" class="sf-remove-actor-btn" data-actor-id="{{actor.id}}" title="Remove">
        <i class="fas fa-times"></i>
      </button>
      {{/unless}}
    </div>
    {{else}}
    <p class="sf-empty-pool">No characters added yet.</p>
    {{/each}}
  </div>

  <div class="sf-panel-footer">
    <button type="button" class="sf-add-actor-btn">
      <i class="fas fa-user-plus"></i> Add Character
    </button>
  </div>

</div>
