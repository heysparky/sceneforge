<form class="sceneforge-creator">
  <div class="form-group">
    <label for="sf-scene-name">{{localize "SCENEFORGE.SceneCreator.NameLabel"}}</label>
    <input id="sf-scene-name" type="text" name="scene-name"
           placeholder="{{localize 'SCENEFORGE.SceneCreator.NamePlaceholder'}}">
  </div>
  <div class="form-group">
    <label for="sf-scene-type">{{localize "SCENEFORGE.SceneCreator.TypeLabel"}}</label>
    <select id="sf-scene-type" name="scene-type">
      {{#each types}}
      <option value="{{id}}">{{label}}</option>
      {{/each}}
    </select>
  </div>
</form>
